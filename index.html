align-items:center;

border:none;
border-radius:6px;

.mic{background:#e74c3c;color:white}

.verse-box{

line-height:1.6;

}

@keyframes fade{
from{opacity:0;transform:translateY(15px)}
to{opacity:1}
}

.light{
background:#f4f4f4;
color:black;
}

.light .verse-box{
background:white;
}

// =============================
// ELEMENTS
// =============================

const micBtn = document.getElementById("micBtn")
const speechText = document.getElementById("speechText")
const verseResult = document.getElementById("verseResult")
const manualSearch = document.getElementById("manualSearch")
const translationSelect = document.getElementById("translation")

let lastReference = null
let verseTimer = null

// =============================
// DISPLAY WITH 1 SECOND DELAY
// =============================

function showVerseDelayed(text){

if(verseTimer){
clearTimeout(verseTimer)
}

verseTimer = setTimeout(()=>{

verseResult.innerText = text

},1000)

}

// =============================
// VOICE RECOGNITION
// =============================

const SpeechRecognition =
window.SpeechRecognition || window.webkitSpeechRecognition

if(!SpeechRecognition){
alert("Voice recognition not supported in this browser")
}

const recognition = new SpeechRecognition()

recognition.continuous = true
recognition.lang = "en-US"
recognition.interimResults = false

micBtn.onclick = () => {

recognition.start()
speechText.innerText = "Listening..."

}

recognition.onresult = function(event){

let speech =
event.results[event.results.length-1][0]
.transcript
.toLowerCase()

speechText.innerText = "Detected: " + speech

// detect reference
parseScripture(speech)

// detect quoted verse
detectQuotedVerse(speech)

}

recognition.onend = () => {
recognition.start()
}

// =============================
// PARSE SCRIPTURE
// =============================

function parseScripture(text){

text = text.replace(":", " ")

let words = text.split(" ")

let book = words[0]

let numbers = words.filter(w => !isNaN(w))

if(numbers.length < 2) return

let chapter = parseInt(numbers[0])
let verse = parseInt(numbers[1])

searchVerse(book, chapter, verse)

}

// =============================
// INTELLIGENT VERSE DETECTION
// =============================

function detectQuotedVerse(text){

text = text.toLowerCase()

let bestMatch = null
let bestScore = 0
let detectedTranslation = "kjv"

bible.forEach(v=>{

let translations = ["kjv","niv","nlt","esv","nkjv"]

translations.forEach(t=>{

let verseText = v[t].toLowerCase()

let words = text.split(" ")

let score = 0

words.forEach(w=>{
if(verseText.includes(w)){
score++
}
})

if(score > bestScore && score > 4){

bestScore = score
bestMatch = v
detectedTranslation = t

}

})

})

if(bestMatch){

lastReference = {
book:bestMatch.book,
chapter:bestMatch.chapter,
verse:bestMatch.verse
}

translationSelect.value = detectedTranslation

let displayText =
bestMatch.book.toUpperCase()+" "+
bestMatch.chapter+":"+
bestMatch.verse+" - "+
bestMatch[detectedTranslation]

showVerseDelayed(displayText)

}

}

// =============================
// SEARCH VERSE
// =============================

function searchVerse(book, chapter, verse){

let translation = translationSelect.value

let result = bible.find(v =>
v.book === book &&
v.chapter === chapter &&
v.verse === verse
)

if(!result){
showVerseDelayed("Verse not found")
return
}

lastReference = {book,chapter,verse}

let displayText =
book.toUpperCase() +
" " + chapter + ":" + verse +
" - " + result[translation]

showVerseDelayed(displayText)

}

// =============================
// UPDATE WHEN TRANSLATION CHANGES
// =============================

translationSelect.addEventListener("change", ()=>{

if(!lastReference) return

searchVerse(
lastReference.book,
lastReference.chapter,
lastReference.verse
)

})

// =============================
// MANUAL SEARCH
// =============================

manualSearch.addEventListener("keypress", e => {

if(e.key === "Enter"){
parseScripture(e.target.value.toLowerCase())
}

})

// =============================
// THEME BUTTON
// =============================

document.getElementById("themeBtn").onclick = () => {
document.body.classList.toggle("light")
}

// =============================
// COPY VERSE
// =============================

document.getElementById("copyBtn").onclick = () => {

navigator.clipboard.writeText(
verseResult.innerText
)

}

// =============================
// FULLSCREEN
// =============================

document.getElementById("fullBtn").onclick = () => {
document.documentElement.requestFullscreen()
}

// =============================
// KEYBOARD SHORTCUT
// =============================

document.addEventListener("keydown", e => {

if(e.key === "f"){
document.documentElement.requestFullscreen()
}

})

</script>
